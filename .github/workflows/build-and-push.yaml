name: Release Carvel Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'version to build (ex: 1.0.0-rc1)'
        required: true
        default: 'dev'


jobs:
  build-and-release:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🛠️ Install Carvel tools (ytt, kbld, imgpkg)
        uses: carvel-dev/setup-action@v2
        with:
          only: ytt, kbld, imgpkg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Determine Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            # Extrait '1.0.0' à partir de 'refs/tags/v1.0.0'
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          fi
          echo "Building version: ${{ env.VERSION }}"

      - name: 🐳 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Build, Test, and Push via Makefile
        run: |
          make all VERSION=${{ env.VERSION }}

      - name: 📦 Upload Package Manifest as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: carvel-package-manifest-${{ env.VERSION }}
          path: deploy/carvel/repo/packages/capi-argocd-sync/${{ env.VERSION }}.yaml

      - name: 🎉 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: deploy/carvel/repo/packages/capi-argocd-sync/${{ env.VERSION }}.yaml
          generate_release_notes: true